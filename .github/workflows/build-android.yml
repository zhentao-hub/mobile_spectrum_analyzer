name: Build Android APK

# 触发条件：push 到 main 分支，或发起 PR 到 main 分支
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # 使用 Ubuntu 22.04 作为构建环境（兼容 Buildozer）
    runs-on: ubuntu-22.04

    steps:
      # 检出当前仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Buildozer 所需的系统依赖
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo-dev cmake libffi-dev libssl-dev \
            libltdl-dev libbz2-dev libsqlite3-dev \
            libreadline-dev python3-dev python3-pip \
            ca-certificates curl wget

      # 增加虚拟内存，防止编译 scipy/numpy 时内存不足
      - name: Create swap space
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=6144
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      # 安装 Python 打包工具
      - name: Install Buildozer
        run: |
          pip3 install buildozer cython virtualenv

      # 设置 JAVA_HOME
      - name: Setup Java 17
        run: |
          JAVA_17_PATH=$(find /usr/lib/jvm -maxdepth 1 -type d \( -name '*java-17*' -o -name '*17*' \) | grep -v 'temurin-11' | head -1)
          if [ -z "$JAVA_17_PATH" ]; then
            JAVA_17_PATH="/usr/lib/jvm/java-17-openjdk-amd64"
          fi
          echo "JAVA_HOME=$JAVA_17_PATH"
          echo "JAVA_HOME=$JAVA_17_PATH" >> $GITHUB_ENV
          export JAVA_HOME=$JAVA_17_PATH
          $JAVA_HOME/bin/java -version
          $JAVA_HOME/bin/javac -version

      # 进入子目录并构建 Android 调试版 APK
      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          cd mobile_spectrum_analyzer
          buildozer android debug

      # 将生成的 APK 文件上传为构建产物，方便下载
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: spectrum-analyzer-apk
          path: mobile_spectrum_analyzer/bin/*.apk
